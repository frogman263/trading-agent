name: Trading Agent — Session Notification

on:
  push:
    branches: [main]
    paths:
      - 'logs/**.md'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find latest session log
        id: log
        run: |
          set +e

          # ── Select latest by FILENAME, not mtime ──────────────────────────
          # actions/checkout rewrites every file's mtime to checkout time, so
          # `ls -t` is unreliable in CI. Log names are ISO-8601, so a lexical
          # sort == chronological order. T-stamped names sort after date-only
          # names for the same day, so the newest run always wins.
          LATEST_LOG=$(ls logs/*.md 2>/dev/null | sort | tail -1)

          if [ -z "$LATEST_LOG" ]; then
            echo "No log files found"
            exit 0
          fi

          BASENAME=$(basename "$LATEST_LOG" .md)

          # ── Title: handle YYYY-MM-DDTHHMM and date-only YYYY-MM-DD ─────────
          if echo "$BASENAME" | grep -q 'T'; then
            DATE_PART="${BASENAME%%T*}"
            TIME_PART="${BASENAME##*T}"
            TITLE="Trading Agent — ${DATE_PART} ${TIME_PART} ET"
          else
            TITLE="Trading Agent — ${BASENAME}"
          fi

          echo "log_file=$LATEST_LOG" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT

          # ── Decode base64 logs; fall back to plaintext ────────────────────
          # The agent currently commits some logs as a base64 blob. Detect and
          # decode so the greps below see real markdown. (Fix upstream too — see
          # note in the chat: the Routine should write decoded markdown.)
          BODY="/tmp/logbody.txt"
          if base64 -d "$LATEST_LOG" > "$BODY" 2>/dev/null && \
             grep -qiE 'session|trades|account' "$BODY"; then
            echo "Log decoded from base64"
          else
            cp "$LATEST_LOG" "$BODY"
            echo "Log is plaintext"
          fi

          # ── Normalize: strip markdown bold so colon patterns match ────────
          NORM=$(sed 's/\*\*//g' "$BODY")

          money() { grep -iE "$1" <<<"$NORM" | grep -oE '\$[0-9][0-9,]*\.[0-9]{2}' | head -1; }
          pct()   { grep -iE "$1" <<<"$NORM" | grep -oE '[0-9]+\.[0-9]+%' | head -1; }

          VALIDATOR=$(grep -iE 'validator' <<<"$NORM" | grep -oiE 'PASS|FAIL|N/A' | head -1)
          [ -z "$VALIDATOR" ] && VALIDATOR="N/A"
          TRADES=$(grep -iE 'trades executed' <<<"$NORM" | grep -oE '[0-9]+' | head -1)
          [ -z "$TRADES" ] && TRADES="0"
          ACCOUNT=$(money 'account value'); [ -z "$ACCOUNT" ] && ACCOUNT="N/A"
          HWM=$(money 'high.water');        [ -z "$HWM" ]      && HWM="N/A"
          DRAWDOWN=$(pct 'drawdown');       [ -z "$DRAWDOWN" ] && DRAWDOWN="N/A"
          CASH=$(pct 'cash');               [ -z "$CASH" ]     && CASH="N/A"

          MESSAGE=$(printf "Validator: %s\nTrades: %s\nAccount Value: %s\nHWM: %s\nDrawdown: %s\nCash: %s" \
            "$VALIDATOR" "$TRADES" "$ACCOUNT" "$HWM" "$DRAWDOWN" "$CASH")

          MESSAGE_B64=$(echo -n "$MESSAGE" | base64 -w 0)

          echo "validator=$VALIDATOR" >> $GITHUB_OUTPUT
          echo "trades=$TRADES" >> $GITHUB_OUTPUT
          echo "message_b64=$MESSAGE_B64" >> $GITHUB_OUTPUT

      - name: Send Pushover notification
        if: steps.log.outputs.log_file != ''
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER_KEY }}
          TITLE: "${{ steps.log.outputs.title }}"
        run: |
          set -euo pipefail

          echo "${{ steps.log.outputs.message_b64 }}" | base64 -d > /tmp/pushover_message.txt

          curl -s \
            --form-string "token=$PUSHOVER_TOKEN" \
            --form-string "user=$PUSHOVER_USER" \
            --form-string "title=$TITLE" \
            --form "message=</tmp/pushover_message.txt" \
            --form-string "url=https://github.com/${{ github.repository }}/blob/main/${{ steps.log.outputs.log_file }}" \
            --form-string "url_title=View Full Session Log" \
            --form-string "priority=0" \
            https://api.pushover.net/1/messages.json
