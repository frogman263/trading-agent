# Test commit to re-validate workflow
name: Trading Agent — Session Notification

on:
  push:
    branches: [main]
    paths:
      - 'logs/**.md'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Parse session log
        id: log
        run: |
          set -euo pipefail

          DATE=$(date +%Y-%m-%d)
          LOG_FILE="logs/${DATE}.md"

          if [ ! -f "$LOG_FILE" ]; then
            echo "No log file found for today — skipping notification"
            exit 0
          fi

          echo "log_file=$LOG_FILE" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

          # Temporarily relax pipefail for regex parsing
          set +o pipefail

          VALIDATOR=$(grep -i 'validator' "$LOG_FILE" | grep -oiE 'PASS|FAIL|N/A' | head -1 || echo "N/A")
          ACCOUNT=$(grep -o 'Account value:.*\$[0-9,\.]*' "$LOG_FILE" | head -1 | grep -o '\$[0-9,\.]*' | head -1 || echo "N/A")
          HWM=$(grep -i 'high.water' "$LOG_FILE" | grep -o '\$[0-9,\.]*' | head -1 || echo "N/A")
          DRAWDOWN=$(grep -o 'Drawdown:.*[0-9\.]*%' "$LOG_FILE" | head -1 | grep -o '[0-9\.]*%' | head -1 || echo "0%")
          CASH=$(grep -o 'Cash:.*[0-9\.]*%' "$LOG_FILE" | head -1 | grep -o '[0-9\.]*%' | head -1 || echo "N/A")
          TRADES=$(grep -o 'Trades executed: [0-9]*' "$LOG_FILE" | head -1 | grep -o '[0-9]*' || echo "0")

          set -o pipefail

          # Base64 encode the message to safely handle dollar signs and special characters
          MESSAGE_B64=$(printf "%s|%s|%s|%s|%s|%s" \
            "$VALIDATOR" "$TRADES" "$ACCOUNT" "$HWM" "$DRAWDOWN" "$CASH" | base64 -w 0)

          echo "validator=$VALIDATOR" >> $GITHUB_OUTPUT
          echo "trades=$TRADES" >> $GITHUB_OUTPUT
          echo "message_b64=$MESSAGE_B64" >> $GITHUB_OUTPUT

      - name: Send Pushover notification
        if: steps.log.outputs.log_file != ''
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER_KEY }}
          TITLE: "Trading Agent — ${{ steps.log.outputs.date }} | ${{ steps.log.outputs.validator }} | ${{ steps.log.outputs.trades }} trade(s)"
        run: |
          set -euo pipefail

          # Decode base64 message into temp file
          echo "${{ steps.log.outputs.message_b64 }}" | base64 -d > /tmp/pushover_message.txt

          curl -s \
            --form-string "token=$PUSHOVER_TOKEN" \
            --form-string "user=$PUSHOVER_USER" \
            --form-string "title=$TITLE" \
            --form-file "message=</tmp/pushover_message.txt" \
            --form-string "url=github://github.com/${{ github.repository }}/blob/main/${{ steps.log.outputs.log_file }}" \
            --form-string "url_title=View Full Session Log" \
            --form-string "priority=0" \
            https://api.pushover.net/1/messages.json
