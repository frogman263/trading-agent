name: Trading Agent — Session Notification

on:
  push:
    branches: [main]
    paths:
      - 'logs/**.md'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find latest session log
        id: log
        run: |
          set -euo pipefail

          # Get the most recent .md file in logs/
          LATEST_LOG=$(ls -t logs/*.md 2>/dev/null | head -1 || echo "")

          if [ -z "$LATEST_LOG" ]; then
            echo "No log files found"
            exit 0
          fi

          FILENAME=$(basename "$LATEST_LOG" .md)   # Remove .md extension

          echo "log_file=$LATEST_LOG" >> $GITHUB_OUTPUT
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT

          set +o pipefail

          VALIDATOR=$(grep -i 'validator' "$LATEST_LOG" | grep -oiE 'PASS|FAIL|N/A' | head -1 || echo "N/A")
          TRADES=$(grep -o 'Trades executed: [0-9]*' "$LATEST_LOG" | head -1 | grep -o '[0-9]*' || echo "0")
          ACCOUNT=$(grep -o 'Account value:.*\$[0-9,\.]*' "$LATEST_LOG" | head -1 | grep -o '\$[0-9,\.]*' | head -1 || echo "N/A")
          HWM=$(grep -i 'high.water' "$LATEST_LOG" | grep -o '\$[0-9,\.]*' | head -1 || echo "N/A")
          DRAWDOWN=$(grep -o 'Drawdown:.*[0-9\.]*%' "$LATEST_LOG" | head -1 | grep -o '[0-9\.]*%' | head -1 || echo "N/A")
          CASH=$(grep -oE 'Cash[^:]*:[^0-9]*[0-9\.]+%' "$LATEST_LOG" | head -1 | grep -oE '[0-9\.]+%' | head -1 || echo "N/A")

          set -o pipefail

          MESSAGE=$(printf "Validator: %s\nTrades: %s\nAccount Value: %s\nHWM: %s\nDrawdown: %s\nCash: %s" \
            "$VALIDATOR" "$TRADES" "$ACCOUNT" "$HWM" "$DRAWDOWN" "$CASH")

          MESSAGE_B64=$(echo -n "$MESSAGE" | base64 -w 0)

          echo "validator=$VALIDATOR" >> $GITHUB_OUTPUT
          echo "trades=$TRADES" >> $GITHUB_OUTPUT
          echo "message_b64=$MESSAGE_B64" >> $GITHUB_OUTPUT

      - name: Send Pushover notification
        if: steps.log.outputs.log_file != ''
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER_KEY }}
          TITLE: "Trading Agent — ${{ steps.log.outputs.filename }}"
        run: |
          set -euo pipefail

          echo "${{ steps.log.outputs.message_b64 }}" | base64 -d > /tmp/pushover_message.txt

          curl -s \
            --form-string "token=$PUSHOVER_TOKEN" \
            --form-string "user=$PUSHOVER_USER" \
            --form-string "title=$TITLE" \
            --form "message=</tmp/pushover_message.txt" \
            --form-string "url=github://github.com/${{ github.repository }}/blob/main/${{ steps.log.outputs.log_file }}" \
            --form-string "url_title=View Full Session Log" \
            --form-string "priority=0" \
            https://api.pushover.net/1/messages.json